services:
  napcat:
    image: mlikiowa/napcat-docker:latest
    container_name: cet6-napcat
    restart: unless-stopped
    environment:
      NAPCAT_UID: ${NAPCAT_UID:-1000}
      NAPCAT_GID: ${NAPCAT_GID:-1000}
      WEBUI_TOKEN: ${NAPCAT_WEBUI_TOKEN:-napcat-change-me}
    ports:
      - "${NAPCAT_WEBUI_PORT:-6099}:6099"
    volumes:
      - ./docker-data/napcat/config:/app/napcat/config
      - ./docker-data/napcat/qq:/app/.config/QQ
      - ./articles:/data/shared/articles

  # 每天凌晨 6:00 自动抓取文章并生成 PDF
  cet6-daily-generator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cet6-daily-generator
    restart: unless-stopped
    env_file:
      - .env
    environment:
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.deepseek.com/v1}
      LLM_MODEL: ${LLM_MODEL:-deepseek-chat}
    volumes:
      - ./articles:/app/articles
      - ./runtime:/app/runtime
    # 用 supercronic 实现容器内定时任务（每天 06:00 运行）
    command: >
      sh -c "
        while true; do
          now=\$$(date '+%H:%M');
          if [ \"\$$now\" = \"${GENERATE_TIME:-06:00}\" ]; then
            echo '[cron] Starting daily generation...';
            bash /app/run_daily.sh;
            sleep 61;
          fi;
          sleep 30;
        done
      "

  # 每天 07:30 把生成好的 PDF 发送到 QQ
  cet6-qq-pusher:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cet6-qq-pusher
    restart: unless-stopped
    depends_on:
      - napcat
    env_file:
      - .env
    environment:
      CET6_BOT_RUN_MODE: ${CET6_BOT_RUN_MODE:-scheduler}
      NAPCAT_API_BASE: ${NAPCAT_API_BASE:-http://napcat:3000}
      LOCAL_ARTICLE_ROOT: ${LOCAL_ARTICLE_ROOT:-/app/articles}
      NAPCAT_SHARED_ROOT: ${NAPCAT_SHARED_ROOT:-/data/shared/articles}
      CET6_BOT_STATE_FILE: ${CET6_BOT_STATE_FILE:-/app/runtime/qq-push-state.json}
    volumes:
      - ./articles:/app/articles
      - ./runtime:/app/runtime